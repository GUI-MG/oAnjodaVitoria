<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
</head>
<body>
    
    <nav id="navbar">
        <div class="navActions">
            <ul>
                <button class="navButton" onclick="window.location.href='/contos/contos.html'">
                    <i class="bi bi-book"></i> Contos
                </button>
            </ul>
            <ul>
                <button class="navButton" onclick="window.location.href='/aboutUs/whoWeAre.html'">
                    <i class="bi bi-person-fill"></i>    Quem somos
                </button>
            </ul>
        </div>
    </nav>

    <main id="principal" class="container">

        <section id="paints" class="container" onclick="loadContent()">
            <div id="part"></div>
        </section>

        <section class="paintsActions">
            <div class="container">
                <div class="lastPaint" onclick="imagemAnterior()">
                    <button class="paintButton"><i class="bi bi-caret-left"></i></button><p>Anterior</p>
                </div> 
                <div class="carousel">
                    <div class="containerCarousel">
                        <span class="bolinha ativa" onclick="irParaImagem(0)"></span>
                        <span class="bolinha" onclick="irParaImagem(1)"></span>
                        <span class="bolinha" onclick="irParaImagem(2)"></span>
                        <span class="bolinha" onclick="irParaImagem(3)"></span>
                    </div>
                </div>
                <div class="nextPaint" onclick="proximaImagem()">
                    <p>Próximo</p><button class="paintButton"><i class="bi bi-caret-right"></i></button>
                </div>
            </div>
        </section>

        <section class="contentLoaded"></section>

        <section id="pdf" class="container">
            <h3><strong>Desejas somente o conto? Clique abaixo!</strong></h3>
            <a href="archives/O Anjo da Vitória.pdf" id="conto" download>
                <button id="downloadBook">
                    <i class="bi bi-book-fill"></i>    <strong>Baixar conto PDF</strong>
                </button>
            </a>
        </section>
    </main>


    <footer class="rodape">
        <div class="container">
            <small>O Anjo da Vitória &copy;</small>
        </div>
    </footer>

    <script src="js/functions.js"></script>
</body>
</html>
